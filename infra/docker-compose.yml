version: "3.9"

services:
  # ─── API Gateway ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - users-service
      - orders-service
      - payments-service
      - auth-service
    networks:
      - gateway-network
    restart: unless-stopped

  # ─── Backend Services ────────────────────────────────────────────────────────
  # TODO: Replace these with your real services.
  # Each service should expose port 8080 (or update upstream.conf to match).
  #
  # Example with a custom Dockerfile:
  #   users-service:
  #     build:
  #       context: ../services/users
  #       dockerfile: Dockerfile
  #     networks:
  #       - gateway-network
  #
  # Example with a pre-built image:
  #   users-service:
  #     image: your-registry/users-service:latest
  #     environment:
  #       - DATABASE_URL=postgres://...
  #     networks:
  #       - gateway-network

  users-service:
    # TODO: replace image/build with your users service
    image: hashicorp/http-echo
    command: ["-text", "{\"service\":\"users\",\"status\":\"ok\"}"]
    networks:
      - gateway-network

  orders-service:
    # TODO: replace image/build with your orders service
    image: hashicorp/http-echo
    command: ["-text", "{\"service\":\"orders\",\"status\":\"ok\"}"]
    networks:
      - gateway-network

  payments-service:
    # TODO: replace image/build with your payments service
    image: hashicorp/http-echo
    command: ["-text", "{\"service\":\"payments\",\"status\":\"ok\"}"]
    networks:
      - gateway-network

  auth-service:
    # TODO: replace image/build with your auth service
    image: hashicorp/http-echo
    command: ["-text", "{\"service\":\"auth\",\"status\":\"ok\"}"]
    networks:
      - gateway-network

  # ─── Observability Stack ────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - gateway-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - nginx-logs:/var/log/nginx:ro
    depends_on:
      - loki
    networks:
      - gateway-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - gateway-network
    restart: unless-stopped

volumes:
  nginx-logs:
  loki-data:
  grafana-data:

networks:
  gateway-network:
    driver: bridge
