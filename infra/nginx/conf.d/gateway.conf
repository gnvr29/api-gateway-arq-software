# ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ─── HTTPS API Gateway ─────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;

    # ─── SSL Configuration ──────────────────────────────────────────────
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (enable if using a real CA, not self-signed)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/nginx/ssl/ca-chain.crt;

    include /etc/nginx/snippets/proxy-headers.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # ─── Health Check ───────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }

    # ─── Auth Service ───────────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://auth_service/;
    }

    # ─── Users Service ──────────────────────────────────────────────────
    location /api/users/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://users_service/;
    }

    # ─── Orders Service ─────────────────────────────────────────────────
    location /api/orders/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://orders_service/;
    }

    # ─── Payments Service ───────────────────────────────────────────────
    location /api/payments/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://payments_service/;
    }

    # ─── Catch-all ──────────────────────────────────────────────────────
    location / {
        return 404 '{"error":"not_found","message":"Route not registered in gateway"}';
        add_header Content-Type application/json;
    }
}
