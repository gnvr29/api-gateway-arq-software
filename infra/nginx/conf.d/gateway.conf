# ─── HTTP API Gateway ──────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    include /etc/nginx/snippets/security-headers.conf;

    # ─── Gateway Health Check ───────────────────────────────────────────
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"api-gateway"}';
    }

    # ─── Alunos Service ─────────────────────────────────────────────────
    location ~ ^/api/alunos(/.*)?$ {
        limit_req zone=general burst=5 nodelay;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_pass http://alunos_service/alunos$1;
    }

    # ─── Cursos Service ─────────────────────────────────────────────────
    location ~ ^/api/cursos(/.*)?$ {
        limit_req zone=general burst=5 nodelay;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_pass http://cursos_service/cursos$1;
    }

    # ─── Catch-all ──────────────────────────────────────────────────────
    location / {
        default_type application/json;
        return 404 '{"error":"not_found","message":"Route not registered in gateway"}';
    }
}
