# ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ─── HTTPS API Gateway ─────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;

    # ─── SSL Configuration ──────────────────────────────────────────────
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    include /etc/nginx/snippets/proxy-headers.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # ─── Gateway Health Check ───────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    # ─── Alunos Service ─────────────────────────────────────────────────
    # Routes: GET /api/alunos, GET /api/alunos/{id}, POST /api/alunos
    location /api/alunos {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://alunos_service/alunos;
    }

    # ─── Cursos Service ─────────────────────────────────────────────────
    # Routes: GET /api/cursos, GET /api/cursos/{id}, POST /api/cursos
    location /api/cursos {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://cursos_service/cursos;
    }

    # ─── Catch-all ──────────────────────────────────────────────────────
    location / {
        return 404 '{"error":"not_found","message":"Route not registered in gateway"}';
        add_header Content-Type application/json;
    }
}
