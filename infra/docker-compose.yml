services:
  # ─── API Gateway ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - nginx-logs:/var/log/nginx
    # Override default nginx command to remove default.conf that conflicts with our gateway
    command: >
      sh -c "rm -f /etc/nginx/conf.d/default.conf &&
             rm -f /var/log/nginx/access.log /var/log/nginx/error.log &&
             touch /var/log/nginx/access.log /var/log/nginx/error.log &&
             nginx -g 'daemon off;'"
    depends_on:
      alunos-service:
        condition: service_healthy
      cursos-service:
        condition: service_healthy
    networks:
      - gateway-network
    restart: unless-stopped

  # ─── Backend Services ───────────────────────────────────────────────────────
  alunos-service:
    build:
      context: ../services/alunos
      dockerfile: Dockerfile
    container_name: alunos-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=alunos
      - DB_PASSWORD=alunos
      - DB_NAME=alunos_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cursos-service:
    build:
      context: ../services/cursos
      dockerfile: Dockerfile
    container_name: cursos-service
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=cursos
      - DB_PASSWORD=cursos
      - DB_NAME=cursos_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network
    restart: unless-stopped

  # ─── Observability Stack ────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gateway-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.0
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - nginx-logs:/var/log/nginx:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gateway-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gateway-network
    restart: unless-stopped

volumes:
  nginx-logs:
  loki-data:
  grafana-data:
  postgres-data:

networks:
  gateway-network:
    driver: bridge
