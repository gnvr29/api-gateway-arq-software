# ─── Backend Service Definitions ────────────────────────────────────────────
# Each upstream block defines a pool of servers for load balancing.
# Add more server entries as you scale horizontally.

upstream alunos_service {
    least_conn;
    server alunos-service:8081 max_fails=3 fail_timeout=30s;
}

upstream cursos_service {
    least_conn;
    server cursos-service:8080 max_fails=3 fail_timeout=30s;
}
