# ─── Backend Service Definitions ────────────────────────────────────────────
# Each upstream block defines a pool of servers for load balancing.
# Add/remove server entries as you scale.

upstream users_service {
    least_conn;
    server users-service:8080 max_fails=3 fail_timeout=30s;
    # server users-service-2:8080 max_fails=3 fail_timeout=30s;
}

upstream orders_service {
    least_conn;
    server orders-service:8080 max_fails=3 fail_timeout=30s;
    # server orders-service-2:8080 max_fails=3 fail_timeout=30s;
}

upstream payments_service {
    least_conn;
    server payments-service:8080 max_fails=3 fail_timeout=30s;
}

upstream auth_service {
    server auth-service:8080 max_fails=3 fail_timeout=30s;
}

upstream alunos_service {
    server alunos-service:8081 max_fails=3 fail_timeout=30s;
}

upstream cursos_service {
    server cursos-service:8080 max_fails=3 fail_timeout=30s;
}
